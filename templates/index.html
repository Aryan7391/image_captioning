<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Caption Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #10b981;
      --error: #ef4444;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }
    .orb-a { width: 500px; height: 500px; top: -150px; left: -100px; background: var(--accent2); }
    .orb-b { width: 400px; height: 400px; bottom: -100px; right: -100px; background: var(--accent); }

    /* Header */
    header {
      position: relative; z-index: 10;
      width: 100%; max-width: 900px;
      padding: 32px 24px 0;
      display: flex; align-items: center; gap: 14px;
    }

    .logo-chip {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
    }

    header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent); }

    .status-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Main */
    main {
      position: relative; z-index: 10;
      width: 100%; max-width: 900px;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* Panel */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .panel-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .panel-header h2 {
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .panel-body { padding: 20px; }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: var(--surface);
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,229,255,0.04);
    }
    .drop-zone input {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .drop-icon { font-size: 36px; margin-bottom: 10px; display: block; }
    .drop-zone p { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .drop-hint {
      margin-top: 6px;
      font-family: var(--mono); font-size: 10px;
      color: var(--accent); letter-spacing: 1px;
    }

    /* Preview */
    #preview-wrap { display: none; position: relative; }
    #preview-img {
      width: 100%; border-radius: 12px;
      max-height: 260px; object-fit: cover; display: block;
    }
    .preview-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      border-radius: 12px;
    }
    .preview-reset {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      color: var(--text); border-radius: 8px;
      padding: 4px 10px;
      font-family: var(--mono); font-size: 10px;
      cursor: pointer; transition: all 0.2s;
    }
    .preview-reset:hover { background: rgba(255,255,255,0.1); }

    /* Generate button */
    #generate-btn {
      margin-top: 16px; width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none; border-radius: 10px;
      color: #fff; font-family: var(--sans);
      font-weight: 700; font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative; overflow: hidden;
    }
    #generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-shimmer {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
    }
    #generate-btn.loading .btn-shimmer { animation: shimmer 1.2s infinite; }
    @keyframes shimmer { to { transform: translateX(100%); } }

    /* Output panel */
    .output-body {
      padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* Caption box */
    .caption-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      position: relative; overflow: hidden;
    }
    .caption-box::before {
      content: '"';
      position: absolute; top: -10px; left: 10px;
      font-size: 72px; color: var(--accent2);
      opacity: 0.15; font-family: Georgia, serif;
    }
    #caption-text {
      font-size: 17px; font-weight: 700;
      line-height: 1.6; position: relative; z-index: 1;
      min-height: 50px;
    }
    #caption-text.empty { color: var(--muted); font-size: 13px; font-weight: 400; }

    .cursor {
      display: inline-block;
      width: 2px; height: 18px;
      background: var(--accent);
      vertical-align: middle; margin-left: 2px;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Pipeline steps */
    .steps-label {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .steps { display: flex; flex-direction: column; gap: 6px; }
    .step {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); transition: all 0.3s;
    }
    .step.active { border-color: #f59e0b; color: #f59e0b; }
    .step.done   { border-color: var(--success); color: var(--success); }
    .step-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--border); flex-shrink: 0; transition: background 0.3s;
    }
    .step.active .step-dot { background: #f59e0b; animation: pulse 1s infinite; }
    .step.done   .step-dot { background: var(--success); }

    /* Error */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 12px 16px;
      font-family: var(--mono); font-size: 11px;
      color: var(--error); display: none;
    }

    /* Responsive */
    @media (max-width: 650px) {
      main { grid-template-columns: 1fr; }
      header { flex-wrap: wrap; }
      .status-badge { margin-left: 0; }
    }
  </style>
</head>
<body>

<div class="orb orb-a"></div>
<div class="orb orb-b"></div>

<header>
  <div class="logo-chip">CNN + LSTM</div>
  <h1>Caption<span>Net</span></h1>
  <div class="status-badge">
    <span class="status-dot"></span>
    Server Online
  </div>
</header>

<main>
  <!-- Input Panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon">📷</div>
      <h2>Input Image</h2>
    </div>
    <div class="panel-body">

      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*" />
        <span class="drop-icon">🖼️</span>
        <p>Drop an image here<br/>or click to browse</p>
        <div class="drop-hint">JPG · PNG · WEBP · GIF</div>
      </div>

      <div id="preview-wrap">
        <img id="preview-img" src="" alt="Preview" />
        <div class="preview-overlay"></div>
        <button class="preview-reset" id="reset-btn">✕ Clear</button>
      </div>

      <button id="generate-btn" disabled>
        <span class="btn-shimmer"></span>
        Generate Caption
      </button>

    </div>
  </div>

  <!-- Output Panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon">✍️</div>
      <h2>Generated Caption</h2>
    </div>
    <div class="output-body">

      <div class="caption-box">
        <div id="caption-text" class="empty">
          Upload an image to generate a caption…
        </div>
      </div>

      <div class="error-box" id="error-box"></div>

      <div>
        <div class="steps-label">Pipeline</div>
        <div class="steps">
          <div class="step" id="step-1"><span class="step-dot"></span>Image Preprocessing</div>
          <div class="step" id="step-2"><span class="step-dot"></span>CNN Feature Extraction</div>
          <div class="step" id="step-3"><span class="step-dot"></span>LSTM Caption Generation</div>
          <div class="step" id="step-4"><span class="step-dot"></span>Caption Ready</div>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
  const fileInput   = document.getElementById('file-input');
  const dropZone    = document.getElementById('drop-zone');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg  = document.getElementById('preview-img');
  const resetBtn    = document.getElementById('reset-btn');
  const generateBtn = document.getElementById('generate-btn');
  const captionText = document.getElementById('caption-text');
  const errorBox    = document.getElementById('error-box');

  let selectedFile = null;

  // Drag events
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  resetBtn.addEventListener('click', () => {
    selectedFile = null;
    previewWrap.style.display = 'none';
    dropZone.style.display    = 'block';
    generateBtn.disabled      = true;
    fileInput.value           = '';
    resetOutput();
  });

  function handleFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      previewImg.src          = e.target.result;
      dropZone.style.display  = 'none';
      previewWrap.style.display = 'block';
      generateBtn.disabled    = false;
      resetOutput();
    };
    reader.readAsDataURL(file);
  }

  function resetOutput() {
    captionText.textContent = 'Upload an image to generate a caption…';
    captionText.className   = 'empty';
    errorBox.style.display  = 'none';
    ['step-1','step-2','step-3','step-4'].forEach(id => {
      document.getElementById(id).className = 'step';
    });
  }

  function setStep(num, state) {
    document.getElementById('step-' + num).className = 'step ' + state;
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  generateBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    // UI state
    generateBtn.disabled = true;
    generateBtn.classList.add('loading');
    captionText.className   = '';
    captionText.innerHTML   = '<span class="cursor"></span>';
    errorBox.style.display  = 'none';

    // Animate steps
    setStep(1, 'active');
    await sleep(400);
    setStep(1, 'done'); setStep(2, 'active');
    await sleep(500);
    setStep(2, 'done'); setStep(3, 'active');

    // Send image to Flask
    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const response = await fetch('/caption', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (data.error) {
        setStep(3, '');
        errorBox.textContent   = '⚠ ' + data.error;
        errorBox.style.display = 'block';
        captionText.textContent = '';
      } else {
        setStep(3, 'done'); setStep(4, 'active');
        await sleep(300);
        setStep(4, 'done');

        // Typewriter effect
        await typeCaption(data.caption);
      }

    } catch (err) {
      errorBox.textContent   = '⚠ Could not reach server: ' + err.message;
      errorBox.style.display = 'block';
      captionText.textContent = '';
    }

    generateBtn.disabled = false;
    generateBtn.classList.remove('loading');
  });

  async function typeCaption(text) {
    captionText.className = '';
    captionText.innerHTML = '<span class="cursor"></span>';
    for (let i = 0; i < text.length; i++) {
      await new Promise(r => setTimeout(r, 30));
      captionText.innerHTML = text.slice(0, i + 1) + '<span class="cursor"></span>';
    }
    await new Promise(r => setTimeout(r, 400));
    captionText.innerHTML = text;
  }
</script>
</body>
</html>
